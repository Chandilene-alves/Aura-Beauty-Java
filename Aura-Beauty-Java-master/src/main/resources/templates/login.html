<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aura Login</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="background"></div>

<div class="card">
    <div class="logo-container">
        <img th:src="@{/assets/logo.svg}" alt="Aura Beauty Lounge Logo" class="logo-img">
    </div>

    <hr>
    <form id="loginForm">
        <h2>Bem-vindo!</h2>
        <p class="desc">Faça login para gerenciar seus agendamentos.</p>

        <label for="username">E-mail </label>
        <input type="text" id="username" placeholder="seu.email@exemplo.com" required>

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required>

        <div class="row">

            <a href="#">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="login" id="loginBtn">Entrar</button>

        <p class="signup">
            Não tem uma conta? <a th:href="@{/criarconta}">Criar conta</a>
        </p>
        <hr>
    </form>
</div>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
