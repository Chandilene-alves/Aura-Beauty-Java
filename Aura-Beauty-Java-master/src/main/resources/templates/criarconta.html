<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Beauty Lounge - Criar Conta</title>

    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/criarconta.css}">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&amp;display=swap" rel="stylesheet">


</head>
<body>

<div class="page-container">
    <main class="register-card">
        <div class="back">
            <img th:src="@{/assets/icons/arrow_back.svg}" alt="">
            <a th:href="@{/dashboard}">Voltar</a>
        </div>

        <header class="card-header">
            <img th:src="@{/assets/logo.svg}" alt="Aura Beauty Lounge" class="logo">


            <h1>Criar conta </h1>


        </header>

        <form id="form-cadastro">

            <div class="input-group">
                <label th:for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Nome Completo" required="required">
            </div>

            <div class="input-group">
                <label th:for="email">E-mail Profissional</label>
                <input type="email" id="email" name="email" placeholder="E-mail Profissional" required="required">
            </div>

            <div class="input-group">
                <label th:for="perfil">Perfil de acesso</label>
                <select id="perfil" name="perfil" class="form-control" required>
                    <option value="COLABORADOR">Colaborador (Apenas Agendamentos)</option>
                    <option value="ADMIN">Administrador (Acesso Total)</option>
                </select>
            </div>

            <div class="input-group password-container">
                <label th:for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Senha" required="required">
                <img th:src="@{/assets/icons/visibility_off.svg}" class="toggle-password" id="btn-senha"
                     alt="Mostrar senha">
            </div>

            <div class="input-group password-container">
                <label th:for="confirme-senha">Confirme sua Senha</label>
                <input type="password" id="confirme-senha" name="confirmarSenha" placeholder="Confirme sua Senha"
                       required="required">
                <img th:src="@{/assets/icons/visibility_off.svg}" class="toggle-password" id="btn-confirmar"
                     alt="Mostrar senha">
            </div>

            <button type="submit" class="btn-submit">CRIAR CONTA</button>
        </form>


    </main>
</div>
<script th:src="@{/js/criarConta.js}" defer></script>

<script th:src="@{/js/notifications.js}"></script>
</body>
</html>
