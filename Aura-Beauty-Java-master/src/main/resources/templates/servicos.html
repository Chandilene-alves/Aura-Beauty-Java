<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&amp;display=swap" rel="stylesheet">


    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/servicos.css}" />
    <link rel="stylesheet" th:href="@{/css/modal-servicos.css}" />



    <title>Aura Beauty Lounge</title>
</head>
<body>
<aside class="sidebar">
    <div class="logo">
        <img th:src="@{/assets/logo.svg}" alt="Aura Beauty Lounge" />
    </div>
    <nav>
        <ul>
            <li>
                <a th:href="@{/dashboard}"><img th:src="@{/assets/icons/home.svg}" alt="" /> Dashboard</a>
            </li>
            <li>
                <a th:href="@{/agendamentos}">
                    <img th:src="@{/assets/icons/calendar.svg}" alt="" /> Agendamentos
                </a>
            </li>
            <li>
                <a class="active" th:href="@{/servicos}">
                    <img th:src="@{/assets/icons/services.svg}" alt="" /> Serviços
                </a>
            </li>
            <li>
                <a th:href="@{/relatorios}">
                    <img th:src="@{/assets/icons/analytics.svg}" alt="" /> Relatórios
                </a>
            </li>
        </ul>
    </nav>
</aside>

<header class="main-header">
    <div class="page-title">
        <h1>Serviços</h1>
    </div>

    <div class="user-menu">
        <div class="profile">
            <img
                    src="../static/assets/icons/profile.svg"
                    th:src="@{/assets/icons/profile.svg}"
                    alt="Avatar"
                    class="avatar"
            />
            <span id="saudacao-header"></span>
            <img
                    src="../static/assets/icons/arrow-down.svg"
                    th:src="@{/assets/icons/arrow-down.svg}"
                    alt="Expandir"
                    class="chevron"
            />
        </div>

        <div class="logout-dropdown" id="logoutDropdown">
            <a href="#" id="btnLogout" class="dropdown-item">
                <img th:src="@{/assets/icons/logout.svg}" alt="">
                Sair
            </a>
        </div>
    </div>
</header>
<main class="content">
    <section class="appointments-section card">
        <div class="section-header">
            <h2>Gerenciador de Serviços </h2>
            <button class="btn-new-appointment" onclick="abrirModal()">
                <img th:src="@{/assets/icons/add.svg}" alt="" /> Novo Serviço
            </button>
        </div>

        <table>
            <thead>
            <tr>
                <th>Nome do serviço</th>
                <th>Descrição curta</th>
                <th>Duração</th>
                <th>Preço</th>
                <th class="btn-flex">Ações</th>
            </tr>
            </thead>
            <tbody id="tabela-servicos">


            </tbody>
        </table>
    </section>
</main>

<div id="modal-servico" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Cadastrar Novo Serviço</h2>
            <span class="close-button" onclick="fecharModal()">&times;</span>
        </div>

        <form id="form-cadastro-servico">
            <div class="form-group">
                <label for="nome">Nome do Serviço *</label>
                <input type="text" id="nome" required placeholder="Ex: Corte Feminino">
            </div>

            <div class="form-group">
                <label for="descricaoCurta">Descrição Curta</label>
                <input type="text" id="descricaoCurta" placeholder="Ex: Corte e finalização com escova">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="duracaoMinutos">Duração (em minutos) *</label>
                    <input type="number" id="duracaoMinutos" required min="1" placeholder="Ex: 60">
                </div>

                <div class="form-group">
                    <label for="preco">Preço (R$) *</label>
                    <input type="number" id="preco" step="0.01" required min="0" placeholder="Ex: 150.00">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button type="submit" class="btn-salvar">Salvar Serviço</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/modal-servico.js}"></script>
<script th:src="@{/js/menu-drop-down.js}"></script>
<script th:src="@{/js/servico.js}"></script>
</body>
</html>
