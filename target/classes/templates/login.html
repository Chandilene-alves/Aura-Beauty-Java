<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aura Login</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="background"></div>

<div class="card">

    <div class="logo-container">
        <img th:src="@{/assets/logo.svg}" alt="Aura Beauty Lounge Logo" class="logo-img">
    </div>

    <hr>

    <h2>Bem-vindo!</h2>
    <p class="desc">Faça login para gerenciar seus agendamentos.</p>

    <label>E-mail ou Usuário</label>
    <input type="text" placeholder="seu.email@exemplo.com">

    <label>Senha</label>
    <input type="password" placeholder="Digite sua senha">

    <div class="row">
        <div class="check"><label><input type="checkbox"> Lembrar de mim</label></div>

        <a href="#">Esqueceu a senha?</a>
    </div>

    <button class="login">Entrar</button>

    <p class="signup">
        Não tem uma conta? <a href="#">Criar conta</a>
    </p>

    <hr>



</div> </body>
</html>
